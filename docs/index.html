<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Status Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>API Status Monitor</h1>
            <p class="subtitle">统一监控多个站点与模型的可用性状态</p>
            <p class="header-meta">最后同步: <span id="page-updated">-</span></p>
        </header>

        <section class="stats-card">
            <h3>全局概览</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="target-total">-</span>
                    <span class="stat-label">监控目标</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="target-online">-</span>
                    <span class="stat-label">当前正常</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="total-checks">-</span>
                    <span class="stat-label">检测次数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="avg-latency">-</span>
                    <span class="stat-label">平均延迟</span>
                </div>
            </div>
        </section>

        <section class="targets-card">
            <div class="section-head">
                <h3>监控目标</h3>
                <span class="section-note">每张卡片对应一个站点 + 模型组合</span>
            </div>
            <div class="targets-grid" id="targets-grid"></div>
        </section>

        <section class="chart-card">
            <div class="section-head">
                <h3>最近24小时</h3>
                <span class="section-note">按目标展示小时级状态</span>
            </div>
            <div class="grid-list" id="target-grids"></div>
            <div class="chart-legend">
                <span class="legend-item"><span class="dot success"></span> 正常</span>
                <span class="legend-item"><span class="dot fail"></span> 异常</span>
                <span class="legend-item"><span class="dot partial"></span> 混合</span>
                <span class="legend-item"><span class="dot unknown"></span> 无数据</span>
            </div>
        </section>

        <section class="history-card">
            <div class="section-head">
                <h3>最近检测记录</h3>
                <span class="section-note">跨全部目标的最新结果</span>
            </div>
            <div class="history-list" id="history-list"></div>
        </section>

        <footer>
            <p>自动监测 · 每10分钟更新 · <a href="https://github.com" target="_blank" rel="noreferrer">GitHub</a></p>
        </footer>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
