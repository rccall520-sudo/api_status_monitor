<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Status Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>API Status Monitor</h1>
            <p class="subtitle">实时监测API可用性</p>
        </header>

        <section class="status-card" id="current-status">
            <div class="status-header">
                <span class="status-indicator" id="status-dot"></span>
                <h2 id="status-text">加载中...</h2>
            </div>
            <div class="status-details">
                <div class="detail-row">
                    <span class="label">API域名</span>
                    <span class="value" id="api-base">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">探测模型</span>
                    <span class="value" id="model">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">HTTP状态</span>
                    <span class="value" id="http-status">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">响应延迟</span>
                    <span class="value" id="latency">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">最后检测</span>
                    <span class="value" id="last-check">-</span>
                </div>
            </div>
            <div class="error-box" id="error-box" style="display:none;">
                <span class="error-label">错误信息</span>
                <span class="error-message" id="error-message"></span>
            </div>
        </section>

        <section class="stats-card">
            <h3>统计概览（7天）</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="uptime-percent">-</span>
                    <span class="stat-label">可用率</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="total-checks">-</span>
                    <span class="stat-label">检测次数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="avg-latency">-</span>
                    <span class="stat-label">平均延迟</span>
                </div>
            </div>
        </section>

        <section class="chart-card">
            <h3>历史可用性（24小时）</h3>
            <div class="uptime-grid" id="uptime-grid"></div>
            <div class="chart-legend">
                <span class="legend-item"><span class="dot success"></span> 正常</span>
                <span class="legend-item"><span class="dot fail"></span> 异常</span>
                <span class="legend-item"><span class="dot unknown"></span> 无数据</span>
            </div>
        </section>

        <section class="history-card">
            <h3>最近检测记录</h3>
            <div class="history-list" id="history-list"></div>
        </section>

        <footer>
            <p>自动监测 · 每10分钟更新 · <a href="https://github.com" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
